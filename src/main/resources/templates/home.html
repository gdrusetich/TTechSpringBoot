<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinastia - Electrohogar</title>
    <link rel="stylesheet" th:href="@{/home.css(v='1.7')}">
</head>
<body>
    <div id="menu-usuario" class="user-nav-bar">
        <div class="user-info-group">
            <div th:if="${session.userName != null}" class="user-greeting">
                Hola, <strong th:text="${session.userName}"></strong>!
            </div>
            <div th:if="${session.userRole == 'ADMIN'}">
                <a href="/admin" class="btn-panel-control">
                    🛠️ Panel Control
                </a>
            </div>
        </div>

        <div class="user-actions-group">
            <div th:if="${session.userName == null}">
                <a href="/login" class="btn-nav-custom">Ingresar</a>
            </div>

            <div th:if="${session.userName != null}" class="buttons-flex">
                <a href="/perfil" class="btn-nav-custom">⚙️ Perfil</a>
                <a href="/logout" class="btn-nav-custom btn-logout">Cerrar Sesión</a>
            </div>
        </div>
    </div>

    <header class="home-banner-hero" th:style="'background-image: url(' + @{/images/dinastia.png} + ');'">
        <div class="floating-search-trigger" id="nav-search-trigger">
            <div class="search-box-fake">
                <span class="search-icon">🔍</span>
                <input type="text" readonly placeholder="Busca productos, categorías..." class="fake-input">
            </div>
        </div>
    </header>

    <section th:if="${destacados != null && !destacados.isEmpty()}" class="featured-section overlay-featured">
        <div class="container">
            <div class="slider-container">
                <div id="lista-destacados" class="slider-track"></div>
            </div>
            
            <div class="offers-main-row">
                <div class="side-block left-side">
                    <div th:if="${session.userRole == 'ADMIN'}" class="admin-controls">
                        <input type="datetime-local" id="input-fecha-limite" class="d-none timer-input">
                        <button id="btn-timer-toggle" class="btn-timer-admin" onclick="manejarTimer()">
                            Hora Límite
                        </button>
                    </div>
                </div>

                <div class="center-block">
                    <h2 class="section-title">¡OFERTAS!</h2>
                </div>

                <div class="side-block right-side">
                    <div id="countdown-display" class="timer-display" style="display: none;">
                        <span id="timer-numbers"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        /*<![CDATA[*/
        window.productosDestacadosIniciales = /*[[${destacados}]]*/ [];
        /*]]>*/
    </script>

    <main class="main-content">
        <div class="cat-search-container" style="display: flex; align-items: center; gap: 10px;">
            <div th:if="${session.userRole == 'ADMIN'}" class="admin-quick-access">
                <a href="/actualizar" class="filter-btn-admin" 
                style="background: #e67e22; color: #000; padding: 6px 12px; text-decoration: none; 
                        font-size: 0.75rem; font-weight: bold; border-radius: 20px; display: inline-block; white-space: nowrap;">
                    ⚠️ Actualizar Precios
                </a>
            </div>

            <input type="text" id="cat-search" placeholder="🔍 Buscar categoría..." class="nav-input cat-search-input" style="flex-grow: 1;">
        </div>

        <div class="filter-container">
            <div class="panel-wrapper">
                <div class="panel-arrow arrow-left">←</div>
                <div id="categorias-nav" class="panel-movil-container"></div>
                <div class="panel-arrow arrow-right">→</div>
            </div>

            <div class="panel-wrapper">
                <div class="panel-arrow arrow-left">←</div>
                <div id="subcategorias-nav" class="panel-movil-container"></div>
                <div class="panel-arrow arrow-right">→</div>
            </div>

            <div class="panel-wrapper">
                <div class="panel-arrow arrow-left">←</div>
                <div id="nietos-nav" class="panel-movil-container"></div>
                <div class="panel-arrow arrow-right">→</div>
            </div>
        </div>

        <div class="search-filters-bar" style="margin-top: 15px;">
            <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarPorTexto()" class="nav-input">
            
            <th:block th:if="${session.userName != null}">
                <select id="ordenPrecioHome" onchange="aplicarFiltrosYOrden()" class="nav-select">
                    <option value="default">Relevancia</option>
                    <option value="min">Menor a Mayor</option>
                    <option value="max">Mayor a Menor</option>
                </select>

                <select id="tipoFiltroPrecio" onchange="actualizarInterfazFiltros()" class="nav-select">
                    <option value="todos">Todos los precios</option>
                    <option value="menor">Menor que...</option>
                    <option value="mayor">Mayor que...</option>
                    <option value="entre">Entre...</option>
                </select>

                <div id="inputs-precio" class="inline-inputs"></div>
                <button onclick="aplicarFiltrosYOrden()" class="nav-btn-search">Filtrar 🔍</button>
            </th:block>

            <div th:if="${session.userName == null}" style="color: #888; font-size: 0.7rem; margin-left: 10px;">
                Logueate para filtrar por precio
            </div>
        </div>

        <div id="seccion-cliente-vista">
            <div id="lista-productos">Cargando menú...</div>
        </div>    
    </main>

    <div id="tooltip-descripcion" class="tooltip"></div>

    <footer class="footer-principal">
        <a href="/dinastia" class="footer-link">
            <div class="footer-content">
                <span class="brand-name">Dinastía Electrohogar</span> 
                <span class="separator">|</span>
                <span class="address">Martiniano Chilavert 1885, Villa Celina</span> 
                <span class="separator">|</span>
                <span class="copyright">© 2026 - Todos los derechos reservados</span>
            </div>
        </a>
    </footer>

    <script th:src="@{/config.js}"></script>
    <script th:src="@{/auth-check.js}"></script> 
    <script th:src="@{/home.js}"></script>

    <script th:inline="javascript">
        window.nombreUsuario = /*[[${session.userName}]]*/ 'Invitado';
        const userRole = /*[[${session.userRole}]]*/ null;

        if (userRole) {
            localStorage.setItem("role", userRole);
        } else {
            localStorage.removeItem("role");
        }
    </script>
    
    <div id="dropdown-categorias" class="dropdown-content hidden">
        <div id="lista-extra-items"></div>
    </div>
</body>
</html>
