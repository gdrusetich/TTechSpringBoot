<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu TTech - El Turco</title>
    <link rel="stylesheet" th:href="@{/home.css}">
</head>
<body>
    <div id="menu-usuario" class="user-menu-top">
        <div th:if="${session.userName == null}">
            <a href="/login" class="filter-btn">Ingresar</a>
        </div>
        <div th:if="${session.userName != null}" class="user-logged-info">
            <span>Hola, <span th:text="${session.userName}"></span>!</span>
            <a href="/perfil">⚙️ Perfil</a>
            <a href="/logout">Cerrar Sesión</a>
        </div>
    </div>

    <header class="header-container">
        <h1 class="logo-title">EL TURCO</h1>
    </header>

    <main class="main-content">
        <div class="search-container">
            <input type="text" id="busqueda" placeholder="Buscar producto..." 
                   onkeyup="filtrarPorTexto()" class="search-input">
        </div>
        <select id="ordenPrecioHome" onchange="aplicarFiltrosYOrden()" class="tu-clase-css">
            <option value="default">Relevancia</option>
            <option value="min">Precio: Menor a Mayor</option>
            <option value="max">Precio: Mayor a Menor</option>
        </select>

        <div class="filter-container">
            <div id="categorias-nav"></div>
            <div id="subcategorias-nav"></div>
            <div id="nietos-nav"></div>
        </div>
        <div th:if="${session.userRole == 'ADMIN'}" class="admin-filter-box" 
            style="background: #2c2c2c; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #00ff88;">
            <h4 style="color: #00ff88; margin-top: 0;">🛠️ Panel de Control: Precios Desactualizados</h4>
            <form action="/home" method="get" style="display: flex; gap: 10px; align-items: center;">
                <label>Ver precios no tocados desde antes de:</label>
                <input type="date" name="fechaPrecio" th:value="${fechaSeleccionada}" class="search-input">
                <button type="submit" class="filter-btn">Filtrar Precios</button>
                <a href="/home" class="btn-clear" style="text-decoration: none; color: #aaa; font-size: 0.8rem;">Ver todos</a>
            </form>
        </div>

        <div id="seccion-cliente-vista">
            <div id="lista-productos">Cargando menú...</div>
        </div>    
    </main>

    <div id="tooltip-descripcion" class="tooltip"></div>

    <footer class="footer-admin">
        <a href="/login">Acceso Admin</a>
    </footer>

        <script th:src="@{/auth-check.js}"></script> 
        <script th:src="@{/home.js}"></script>

        <script th:inline="javascript">

        window.nombreUsuario = /*[[${session.userName}]]*/ 'Invitado';
        const userRole = /*[[${session.userRole}]]*/ null;

        if (userRole) {
            localStorage.setItem("role", userRole);
        } else {
            localStorage.removeItem("role");
        }
        </script>

</body>
</html>
