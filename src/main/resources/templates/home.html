<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinastia - Electrohogar</title>
    <link rel="stylesheet" th:href="@{/home.css(v='1.1')}">
</head>
<body>
    <div id="menu-usuario" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: transparent; width: 100%; box-sizing: border-box;">
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div th:if="${session.userName != null}" style="color: white; font-size: 0.95rem;">
                Hola, <strong th:text="${session.userName}" style="color: #ff9800;"></strong>!
            </div>

            <div th:if="${session.userRole == 'ADMIN'}">
                <a href="/admin" class="btn-panel-control">
                    🛠️ Panel Control
                </a>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div th:if="${session.userName == null}">
                <a href="/login" class="filter-btn" style="text-decoration: none;">Ingresar</a>
            </div>

            <div th:if="${session.userName != null}" style="display: flex; gap: 10px;">
                <a href="/perfil" class="filter-btn" style="text-decoration: none;">⚙️ Perfil</a>
                <a href="/logout" class="filter-btn" style="background: #444; color: #ff5252; border-color: #555; text-decoration: none;">
                    Cerrar Sesión
                </a>
            </div>
        </div>
    </div>

    <header class="header-container">
        <h1 class="logo-title">DINASTÍA</h1>
    </header>

    <section th:if="${destacados != null && !destacados.isEmpty()}" class="featured-section">
        <div class="container">
            <h2 class="section-title">¡PRODUCTOS DESTACADOS!</h2>
            <div class="product-grid">
                <div th:each="p : ${destacados}" 
                    class="product-card featured-card" 
                    th:onclick="|window.location.href='/detalle?id=${p.productId}'|">
                    
                    <h3 class="featured-title-top" th:text="${p.title}">Panacom</h3>
                    
                    <div class="featured-img-container">
                        <img th:src="@{'/images/' + ${p.imageUrl}}" th:alt="${p.title}" class="product-img"
                            onerror="this.src='/images/default.png';">
                    </div>

                    <div class="featured-actions-container">
                        <p class="product-price" th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 'POINT', 0, 'COMMA')}">$0</p>
                        
                        <a th:href="@{'https://wa.me/5491137869814?text=Hola! Me interesa el ' + ${p.title}}" 
                        class="btn-wa-featured" 
                        onclick="event.stopPropagation();" 
                        target="_blank">
                            <img th:src="@{/images/WhatsApp.png}" alt="Pedir por WA" class="wa-icon-featured">
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <hr class="section-divider">
    </section>

    <main class="main-content">
        <div class="search-filters-bar">
            <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarPorTexto()" class="nav-input">
            <th:block th:if="${session.userName != null}">
                <select id="ordenPrecioHome" onchange="aplicarFiltrosYOrden()" class="nav-select">
                    <option value="default">Relevancia</option>
                    <option value="min">Precio: Menor a Mayor</option>
                    <option value="max">Precio: Mayor a Menor</option>
                </select>

                <select id="tipoFiltroPrecio" onchange="actualizarInterfazFiltros()" class="nav-select">
                    <option value="todos">Todos los precios</option>
                    <option value="menor">Menor que...</option>
                    <option value="mayor">Mayor que...</option>
                    <option value="entre">Entre...</option>
                </select>

                <div id="inputs-precio" class="inline-inputs"></div>

                <button onclick="aplicarFiltrosYOrden()" class="nav-btn-search">Filtrar 🔍</button>
            </th:block>
            <div th:if="${session.userName == null}" style="color: #888; font-size: 0.8rem; margin-left: 10px;">
                Logueate para filtrar por precio
            </div>
        </div>

        <div class="filter-container">
            <div id="categorias-nav"></div>
            <div id="subcategorias-nav"></div>
            <div id="nietos-nav"></div>
        </div>
        <div th:if="${session.userRole == 'ADMIN'}" class="admin-quick-access" style="margin-top: 15px;">
            <a href="/actualizar" class="filter-btn" style="background: #e67e22; border-color: #d35400; text-decoration: none; display: inline-block;">
                ⚠️ Auditar Precios Desactualizados
            </a>
        </div>

        <div id="seccion-cliente-vista">
            <div id="lista-productos">Cargando menú...</div>
        </div>    
    </main>

    <div id="tooltip-descripcion" class="tooltip"></div>

    <footer class="footer-admin">
        <a href="/login">Acceso Admin</a>
    </footer>
    <script th:src="@{/config.js}"></script>
    <script th:src="@{/auth-check.js}"></script> 
    <script th:src="@{/home.js}"></script>

    <script th:inline="javascript">

    window.nombreUsuario = /*[[${session.userName}]]*/ 'Invitado';
    const userRole = /*[[${session.userRole}]]*/ null;

    if (userRole) {
        localStorage.setItem("role", userRole);
    } else {
        localStorage.removeItem("role");
    }
    </script>
    
    <div id="dropdown-categorias" class="dropdown-content hidden">
        <div id="lista-extra-items"></div>
    </div>

</body>
</html>
