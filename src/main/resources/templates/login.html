<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dinastía - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-box { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border-top: 5px solid #ff9800; 
            width: 100%; /* Cambiado a 100% para controlarlo con max-width */
            max-width: 380px; /* Tamaño máximo en PC */
            text-align: center; 
            box-sizing: border-box; /* Fundamental para que el padding no rompa el ancho */
        }

        h2 { color: #ff9800; margin-bottom: 25px; }

        input { 
            width: 100%; 
            padding: 14px; /* Un poquito más alto para el dedo */
            margin: 12px 0; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #2a2a2a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px; /* Evita el zoom automático en celulares */
        }
        
        .button-group { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
        }

        button, .btn-cancelar { 
            flex: 1; 
            padding: 14px; 
            border: none; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-decoration: none; 
            font-size: 1rem; /* Un toque más grande */
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        button { background: #ff9800; color: black; }
        button:hover { background: #e68a00; transform: scale(1.02); }

        .btn-cancelar { background: #333; color: white; }
        .btn-cancelar:hover { background: #444; transform: scale(1.02); }

        .error { color: #ff5252; font-size: 0.9rem; margin-top: 15px; }

        .login-footer { 
            margin-top: 25px; 
            border-top: 1px solid #333; 
            padding-top: 20px; 
        }

        /* Media Query ajustada */
        @media (max-width: 480px) {
            .login-box { 
                width: 90%; 
                padding: 20px; 
            }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acceso Usuarios</h2> 
        <form action="/login-universal" method="POST">
            <input type="hidden" name="redirectUrl" id="redirectUrl">
            
            <input type="text" name="user" placeholder="Usuario" required>
            <input type="password" name="pass" placeholder="Password" required>
            
            <div class="button-group">
                <button type="submit">Entrar</button>
                <a href="/home" class="btn-cancelar">Inicio</a>
            </div>
        </form>

        <div class="login-footer">
            <p style="font-size: 0.85rem; color: #888; margin: 0;">
                ¿No tiene usuario? 
                <a href="https://wa.me/5491137869814?text=Hola!%20Quisiera%20solicitar%20un%20usuario%20para%20la%20Dinastía%20App!!" 
                   target="_blank" 
                   style="color: #ff9800; text-decoration: none; font-weight: bold;">
                   Solicitar usuario.
                </a>
            </p>
        </div>

        <script>
            const returnUrl = localStorage.getItem("returnUrl");
            if (returnUrl) {
                document.getElementById("redirectUrl").value = returnUrl;
            }
        </script>
        
        <p th:if="${param.error}" class="error">Usuario o clave incorrectos</p>
    </div>
</body>
</html>
