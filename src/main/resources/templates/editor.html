<div th:fragment="editor-script">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    <script>
      function inicializarEditor(selector) {
          tinymce.init({
              selector: selector,
              plugins: 'lists link',
              toolbar: 'undo redo | bold italic | bullist numlist',
              menubar: false,
              language: 'es'
          });
      }
    </script>
</div>
