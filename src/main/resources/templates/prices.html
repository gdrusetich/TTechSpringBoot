<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dinastía - Modificación de Precios</title>
    <link rel="stylesheet" th:href="@{/prices.css}">
</head>
<body>
    <div class="header-precios">
        <div class="titulo-seccion">
            <h2>📊 Gestión de Precios</h2>
        </div>
        
        <div class="contenedor-filtros">
            <input type="text" id="busqueda-precios" placeholder="🔍 Buscar nombre..." 
                onkeyup="filtrarTodo()">
            
            <select id="filtro-categoria" onchange="manejarCambioCategoria()">
                <option value="todas">Categorías</option>
            </select>

            <select id="filtro-subcategoria" style="display:none;" onchange="filtrarTodo()">
                <option value="todas">Todas las Subcategorías</option>
            </select>
        </div>
        
        <div class="botones-header">
            <button class="btn-volver" onclick="window.location.href='/home'">⬅ Volver</button>
            <button class="btn-guardar-todo" onclick="guardarCambios()">💾 GUARDAR</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre del Producto</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <tr><td colspan="4">Cargando productos...</td></tr>
        </tbody>
    </table>

    <script th:src="@{/utils.js}"></script>
    <script th:src="@{/prices.js}"></script>
</body>
</html>
