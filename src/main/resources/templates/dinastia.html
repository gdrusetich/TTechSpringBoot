<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinastía - Contacto</title>
    <link rel="stylesheet" th:href="@{/home.css}">
    <link rel="stylesheet" th:href="@{/dinastia.css}">
</head>
<body class="dinastia-body">

    <header class="hero-banner-dinastia" 
            th:style="'background-image: url(' + @{/images/dinastia.png} + ');'">
        <a th:href="@{/home}" class="banner-back-link" title="Volver al Home">
            <div class="link-overlay"></div>
        </a>
    </header>

    <section class="nosotros-container">
        
        <div class="dinastia-layout">
            
            <aside class="sidebar-contacto">
                
                <div class="card-contacto">
                    <h2>CONTACTO</h2>
                    <div class="item-contacto">
                        <span class="label">Teléfono</span>
                        <p class="valor">11 2345-6789</p>
                    </div>
                    <div class="item-contacto">
                        <span class="label">Dirección</span>
                        <p class="valor">Martiniano Chilavert 1885, Villa Celina</p>
                    </div>
                    <div class="item-contacto">
                        <span class="label">Horario de Atención</span>
                        <p class="valor">Lunes a Sábados: 09:00 a 20:00 hs</p>
                    </div>
                </div>

                <div class="espaciador"></div>

                <div class="mapa-contenedor">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3280.536712345678!2d-58.495!3d-34.698!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzTCsDQxJzUyLjgiUyA1OMKwMjknNDIuMCJX!5e0!3m2!1ses!2sar!4v123456789" 
                        width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </aside>

            <main class="contenido-derecha">
                <div class="foto-local-wrapper">
                    <img th:src="@{/images/Dinastia.jpg}" alt="Local Dinastía" class="foto-principal">
                </div>
            </main>

        </div>
    </section>

</body>
</html>
