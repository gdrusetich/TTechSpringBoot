    spring.application.name=Clase Springboot
    server.port=${PORT:8081}
    # ACTIVAR PERFIL LOCAL
    spring.profiles.active=local

    # Si Render te da una variable DATABASE_URL, úsala; si no, usa localhost (tu PC)
    #spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/dinastia_database}
    #spring.datasource.username=${DATABASE_USERNAME:turco_admin}
    #spring.datasource.password=${DATABASE_PASSWORD:q2vNHJU01KGxGEuuS3jgUDKvm0DAnaL6}

    spring.datasource.url=${DATABASE_URL}
    spring.datasource.username=${DATABASE_USERNAME}
    spring.datasource.password=${DATABASE_PASSWORD}

    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
    spring.jpa.properties.hibernate.default_batch_fetch_size=20
#   spring.sql.init.continue-on-error=true

    # SQL Inicial - ESTO ES LO QUE LLENA LAS TABLAS
    spring.sql.init.mode=never
#    spring.sql.init.data-locations=classpath:DatosIniciales.sql
#    spring.jpa.defer-datasource-initialization=false

    # Seguridad y Archivos
    spring.servlet.multipart.max-file-size=10MB
    spring.servlet.multipart.max-request-size=10MB
